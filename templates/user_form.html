<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ 'Crear usuario' if action=='create' else 'Editar usuario' }}</title>

    <!-- BOOTSTRAP 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/web/users">Gestión de Usuarios</a>
    </div>
</nav>

<div class="container col-md-6">

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">
                {{ '➕ Crear usuario' if action=='create' else '✏️ Editar usuario' }}
            </h4>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label for="name" class="form-label">Nombre</label>
                    <input 
                        id="name"
                        type="text" 
                        class="form-control" 
                        name="name" 
                        required
                        placeholder="Ingresa el nombre"
                        value="{% if usuario %}{{ usuario.name }}{% else %}{{ request.form.get('name', '') }}{% endif %}"
                    >
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input 
                        id="email"
                        type="email" 
                        class="form-control" 
                        name="email" 
                        required
                        placeholder="Ingresa el email"
                        value="{% if usuario %}{{ usuario.email }}{% else %}{{ request.form.get('email', '') }}{% endif %}"
                    >
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/web/users" class="btn btn-secondary">⬅ Volver</a>

                    <button type="submit" class="btn btn-success">
                        ✅ {{ 'Guardar' if action=='create' else 'Actualizar' }}
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
